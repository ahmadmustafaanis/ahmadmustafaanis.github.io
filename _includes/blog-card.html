<article class="blog-card">
  <div class="blog-card-meta">
    {% if include.post.topic %}
      <span class="blog-topic">{{ include.post.topic }}</span>
    {% else %}
      <span class="blog-topic blog-topic-neutral">Notes</span>
    {% endif %}
    <time datetime="{{ include.post.date | date_to_xmlschema }}">{{ include.post.date | date: "%b %-d, %Y" }}</time>
  </div>
  <h3><a href="{{ include.post.url | relative_url }}">{{ include.post.title }}</a></h3>
  <p>{{ include.post.description | default: include.post.excerpt | strip_html | strip_newlines | truncate: 170 }}</p>
  <a class="blog-card-link" href="{{ include.post.url | relative_url }}" aria-label="Read {{ include.post.title }}">Read article &rarr;</a>
</article>
